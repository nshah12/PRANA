name: prana-api CI

on:
  push:
    paths:
      - 'prana-api/**'
      - 'prana-db/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    paths:
      - 'prana-api/**'
      - 'prana-db/**'

defaults:
  run:
    working-directory: prana-api

jobs:
  enforce:
    name: Enforce rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/enforce_rules.py

  lint-type:
    name: Lint & type-check
    runs-on: ubuntu-latest
    needs: enforce
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: prana-api/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type-check
        run: mypy . --ignore-missing-imports --exclude tests/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: prana-api/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint-type, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push on PR)
        uses: docker/build-push-action@v5
        with:
          context: ./prana-api
          push: false
          tags: prana-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./prana-api
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/prana-api:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/prana-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
