name: Deploy Portal to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'prana-portal/**'
      - '.github/workflows/deploy-portal.yml'
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Backend API base URL (e.g. https://api.prana.in)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prana-portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: prana-portal/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          # Sets asset base to /<repo-name>/ — GitHub Pages project URL format.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # If secret PORTAL_API_URL is set it overrides .env.production; otherwise .env.production wins.
          VITE_API_URL: ${{ github.event.inputs.api_url || secrets.PORTAL_API_URL }}
        run: npx vite build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: prana-portal/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
