name: prana-mobile CI

on:
  push:
    paths:
      - 'prana-mobile/**'
      - '.github/workflows/ci-mobile.yml'
  pull_request:
    paths:
      - 'prana-mobile/**'

defaults:
  run:
    working-directory: prana-mobile

jobs:
  lint-type:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: prana-mobile/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

  test:
    name: Jest tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: prana-mobile/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run Jest
        run: npm test -- --ci --coverage --passWithNoTests

  eas-build-check:
    name: EAS build config check
    runs-on: ubuntu-latest
    needs: [lint-type, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: prana-mobile/package-lock.json

      - name: Install deps + EAS CLI
        run: |
          npm ci
          npm install -g eas-cli

      - name: Validate EAS config
        run: eas build:inspect --platform all --output preview --verbose
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
